services:
  vllm-qwen3-tts:
    image: vllm-omni:custom
    container_name: vllm-qwen3-tts
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0  # RTX 3090은 GPU 0번
      # --- 가속 엔진 및 병목 제거 설정 ---
      - VLLM_USE_V1=1
      - VLLM_ATTENTION_BACKEND=FLASHINFER
      # HuggingFace 캐시 경로 (Dockerfile ENV 및 볼륨 마운트와 일치)
      - HF_HOME=/root/.cache/huggingface
    volumes:
      # HuggingFace 캐시 디렉토리를 컨테이너 안으로 마운트
      - /home/posicube/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "30000:30000"
    command:
      - "Qwen/Qwen3-TTS-12Hz-1.7B-Base"  # HF hub ID 사용 (캐시 마운트로 오프라인 로드)
      - "--omni"
      - "--trust-remote-code"
      - "--max-model-len"
      - "1024"
      - "--dtype"
      - "bfloat16"
      - "--gpu-memory-utilization"
      - "0.85"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "30000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']  # RTX 3090 (GPU 0)
              capabilities: [gpu]
