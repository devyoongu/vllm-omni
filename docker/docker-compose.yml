services:
  vllm-qwen3-tts:
    image: vllm-omni:custom
    container_name: vllm-qwen3-tts
    runtime: nvidia
    shm_size: '16gb'  # 공유 메모리 크기 (필요에 따라 조정)
    environment:
      - NVIDIA_VISIBLE_DEVICES=0  # RTX 3090은 GPU 0번
      # --- 가속 엔진 및 병목 제거 설정 ---
      - VLLM_USE_V1=1
      - VLLM_ATTENTION_BACKEND=FLASHINFER
      # HuggingFace 캐시 경로 (Dockerfile ENV 및 볼륨 마운트와 일치)
      - HF_HOME=/root/.cache/huggingface
      # Code2Wav stage가 코덱 스트리밍을 위해 max_position_embeddings(32768) 초과 필요
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - OMP_NUM_THREADS=4  # CPU 스레드 수 조정 (필요에 따라 조정)
    volumes:
      # HuggingFace 캐시 디렉토리를 컨테이너 안으로 마운트
      - /home/yh.ahn/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "30000:30000"
    command:
      - "Qwen/Qwen3-TTS-12Hz-0.6B-Base"  # HF hub ID 사용 (캐시 마운트로 오프라인 로드)
      - "--omni"
      - "--trust-remote-code"
      - "--max-model-len"
      - "4096"
      - "--dtype"
      - "bfloat16"
      - "--gpu-memory-utilization"
      - "0.9"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "30000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']  # RTX 3090 (GPU 0)
              capabilities: [gpu]
